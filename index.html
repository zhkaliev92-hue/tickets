<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://coo-tickets-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "coo-tickets"
};

firebase.initializeApp(firebaseConfig);
const ref = firebase.database().ref("tickets");

let currentUser = "";
let cache = {};

function login(){
  const name = document.getElementById("username").value.trim();

  if(!name){
    alert("Введите имя");
    return;
  }

  currentUser = name;
  localStorage.setItem("user", name);

  document.getElementById("user").textContent = name;
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("app").style.display = "block";
}

window.onload = () => {
  const u = localStorage.getItem("user");

  if(u){
    currentUser = u;
    document.getElementById("user").textContent = u;
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("app").style.display = "block";
  }

  ref.on("value", snap => {
    cache = snap.val() || {};
    render();
  });
};

function addTicket(){

  if(!currentUser){
    alert("Сначала войдите");
    return;
  }

  const ticket = document.getElementById("ticket").value.trim();

  if(!ticket){
    alert("Введите тикет");
    return;
  }

  ref.push({
    date: document.getElementById("date").value || "",
    ticket: ticket,
    idnumber: document.getElementById("idnumber").value || "",
    violation: document.getElementById("violation").value || "",
    violationComment: document.getElementById("violationComment").value || "",
    violationTime: document.getElementById("violationTime").value || "",
    specialist: document.getElementById("specialist").value || "",
    status: document.getElementById("status").value || "В работе",
    createdBy: currentUser,
    createdAt: Date.now()
  });

  alert("Тикет добавлен");

  document.getElementById("ticket").value = "";
}

function deleteTicket(id){
  if(confirm("Удалить?")){
    ref.child(id).remove();
  }
}

function render(){
  const q = (document.getElementById("search").value || "").toLowerCase();

  const rows = Object.entries(cache).sort(
    (a,b)=> (b[1].createdAt||0)-(a[1].createdAt||0)
  );

  let html = "";

  for(const [id,t] of rows){
    if(JSON.stringify(t).toLowerCase().includes(q)){
      html += `
      <tr>
        <td>${t.date||""}</td>
        <td>${t.ticket||""}</td>
        <td>${t.idnumber||""}</td>
        <td>${t.violation||""}</td>
        <td>${t.violationComment||""}</td>
        <td>${t.violationTime||""}</td>
        <td>${t.specialist||""}</td>
        <td>${t.createdBy||""}</td>
        <td>${t.status||""}</td>
        <td><button onclick="deleteTicket('${id}')">X</button></td>
      </tr>`;
    }
  }

  document.getElementById("list").innerHTML = html;
}
</script>
