<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Тикеты</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<style>
body{font-family:Arial;background:#eef7ff;margin:0}
.container{max-width:1000px;margin:auto;padding:20px}
.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:15px}
input,textarea,select,button{width:95%;padding:10px;margin-top:8px}
button{background:#1fa2ff;color:#fff;border:none;cursor:pointer}
table{width:100%;border-collapse:collapse}
td,th{border:1px solid #ddd;padding:8px}
th{background:#1fa2ff;color:#fff}
a{
  color:#0066ff;
  text-decoration:underline;
  font-weight:bold;
}
  .delete-btn{
  background:red !important;
  color:white !important;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
  width:auto;
  font-size:16px;
}

.delete-btn:hover{
  background:darkred !important;
}
  .row{
  display:flex;
  gap:10px;
}

.row input{
  width:50%;
  margin-top:8px;
}
  .channel-bar{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin:15px 0;
}

.channel-btn{
    width:auto;
    padding:10px 18px;
    border:none;
    border-radius:8px;
    background:#e5e5e5;
    color:#000;
    cursor:pointer;
    font-weight:bold;
}

.channel-btn.active{
    background:#1fa2ff;
    color:#fff;
}
  @media (max-width: 768px){

  table{
    display:none;
  }

  #mobileList{
    display:block;
  }

  .ticket-card{
    background:#fff;
    border-radius:10px;
    padding:12px;
    margin-bottom:10px;
    box-shadow:0 1px 4px rgba(0,0,0,.1);
  }

  .ticket-card div{
    margin:4px 0;
  }
}

@media (min-width: 769px){

  #mobileList{
    display:none;
  }

}
</style>
</head>

<body>

<div class="container">

<h2> Тикеты</h2>
<div class="channel-bar">

<button type="button" class="channel-btn active" onclick="selectChannel(this,'ЦОО')">ЦОО</button>

<button type="button" class="channel-btn" onclick="selectChannel(this,'ПСС')">ПСС</button>

<button type="button" class="channel-btn" onclick="selectChannel(this,'160')">160</button>

<button type="button" class="channel-btn" onclick="selectChannel(this,'165')">165</button>

<button type="button" class="channel-btn" onclick="selectChannel(this,'СОВО')">СОВО</button>

</div>
<div class="card">

<div class="row">
  <input id="date" type="date">
  <input id="violationTime" type="time">
</div>

<div class="row">
  <input id="ticket" placeholder="Мобильный номер">
  <input id="idnumber" placeholder="ID">
</div>

<input id="violation" placeholder="Нарушение">
<input id="violationComment" placeholder="Комментарий">
<input id="specialist" placeholder="ФИО специалиста">

<button onclick="addTicket()">Добавить</button>

</div>

<div class="card">

<div id="stats" style="
font-weight:bold;
margin-bottom:10px;
font-size:18px;
">
Всего: 0 | В работе: 0 | Выполнено: 0
</div>

<input id="search" placeholder="Поиск" oninput="render()">

<table>
<thead>
<tr>
<th>Канал</th>
<th>Дата</th>
<th>Мобильный номер</th>
<th>ID</th>
<th>Нарушение</th>
<th>Комментарий</th>
<th>Время</th>
<th>ФИО специалиста</th>
<th>Статус</th>
<th>Удалить</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>
  <div id="mobileList"></div>
</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDhKz-OqRWFNRKEt6Aw5ynqB_xXzYt2SYI",
  authDomain: "coo-tickets-5aa42.firebaseapp.com",
  databaseURL:"https://coo-tickets-5aa42-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "coo-tickets-5aa42",
  storageBucket: "coo-tickets-5aa42.firebasestorage.app",
  messagingSenderId: "94031170350",
  appId: "1:94031170350:web:1a18dc569f50e3f0f6c8bf",
  measurementId: "G-XC5RVRSE2X"
};


/* 🔥 2. INIT (ТОЛЬКО ОДИН РАЗ) */
firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
const ref = firebase.database().ref("tickets");
let cache = {};
  auth.onAuthStateChanged(user => {

  if(!user){

    const email = prompt("Введите логин");
    const password = prompt("Введите пароль");

    auth.signInWithEmailAndPassword(email, password)
      .catch(err => {
        alert("Ошибка входа: " + err.message);
        location.reload();
      });

  }

});
  let selectedChannel = "ЦОО";

function selectChannel(btn, channel){

    selectedChannel = channel;

    document
        .querySelectorAll(".channel-btn")
        .forEach(b => b.classList.remove("active"));

    btn.classList.add("active");
}

/* 🔥 3. LOAD DATA */
ref.on("value", snap => {
  cache = snap.val() || {};
  render();
});

/* 🔥 4. ADD TICKET */
function addTicket(){

  const ticket = document.getElementById("ticket").value.trim();
  const callId = document.getElementById("idnumber").value.trim();

  if(!ticket){
    alert("Введите тикет");
    return;
  }

  ref.push({
    date: document.getElementById("date").value,
    ticket: ticket,
    idnumber: callId,
    violation: document.getElementById("violation").value,
    violationComment: document.getElementById("violationComment").value,
    violationTime: document.getElementById("violationTime").value,
    specialist: document.getElementById("specialist").value,
    channel: selectedChannel,
    status: "В работе",
    createdAt: Date.now()
  });

  alert("Добавлено");

  document.getElementById("ticket").value = "";
  document.getElementById("idnumber").value = "";
  document.getElementById("violation").value = "";
  document.getElementById("violationComment").value = "";
  document.getElementById("violationTime").value = "";
  document.getElementById("specialist").value = "";
}
/* 🔥 5. DELETE */
function deleteTicket(id){
  ref.child(id).remove();
}

/* 🔥 6. RENDER */
function render(){

  const list = document.getElementById("list");
  const q = (document.getElementById("search").value || "").toLowerCase();

  let html = "";
  let mobileHtml = "";
  let total = 0;
let work = 0;
let done = 0;

  Object.entries(cache)
    .sort((a,b)=> (b[1].createdAt||0)-(a[1].createdAt||0))
    .forEach(([id,t])=>{
      total++;

if(t.status==="В работе"){
  work++;
}

if(t.status==="Выполнен"){
  done++;
}

      if(JSON.stringify(t).toLowerCase().includes(q)){

        html += `
  <tr>
    <td><b>${t.channel || "ЦОО"}</b></td>
    <td>${t.date || ""}</td>
    <td>${t.ticket || ""}</td>

            <td>
              <a href="https://qbox.telecom.kz/apps/#/support/analytics/calls/text/history?call_id=${t.idnumber}"
                 target="_blank">
                ${t.idnumber || ""}
              </a>
            </td>

            <td>${t.violation || ""}</td>
            <td>${t.violationComment || ""}</td>
            <td>${t.violationTime || ""}</td>
            <td>${t.specialist || ""}</td>
            <td>
  <select onchange="changeStatus('${id}', this.value)">
    <option ${t.status === "В работе" ? "selected" : ""}>В работе</option>
    <option ${t.status === "Выполнен" ? "selected" : ""}>Выполнен</option>
  </select>
</td>

            <td>
  <button class="delete-btn" onclick="deleteTicket('${id}')">
    🗑️
  </button>
</td>
          </tr>
        `;
        mobileHtml += `
<div class="ticket-card">

<div><b>Канал:</b> ${t.channel || "ЦОО"}</div>

<div><b>Дата:</b> ${t.date || ""}</div>

<div><b>Время:</b> ${t.violationTime || ""}</div>

<div><b>Номер:</b> ${t.ticket || ""}</div>

<div>
<b>ID:</b>
<a href="https://qbox.telecom.kz/apps/#/support/analytics/calls/text/history?call_id=${t.idnumber}"
target="_blank">
${t.idnumber || ""}
</a>
</div>

<div><b>Нарушение:</b> ${t.violation || ""}</div>

<div><b>Комментарий:</b> ${t.violationComment || ""}</div>

<div><b>Специалист:</b> ${t.specialist || ""}</div>

<div><b>Статус:</b> ${t.status || ""}</div>

</div>
`;
      }

    });

  list.innerHTML = html;

document.getElementById("mobileList").innerHTML = mobileHtml;

document.getElementById("stats").innerHTML =
`Всего: ${total} | В работе: ${work} | Выполнено: ${done}`;
}
</script>

</body>
</html>
