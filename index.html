<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ЦОО тикетов</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body{font-family:Arial;background:#eef7ff;margin:0}
.container{max-width:1000px;margin:auto;padding:20px}
.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:15px}
input,textarea,select,button{width:100%;padding:10px;margin-top:8px}
button{background:#1fa2ff;color:#fff;border:none;cursor:pointer}
table{width:100%;border-collapse:collapse}
td,th{border:1px solid #ddd;padding:8px}
th{background:#1fa2ff;color:#fff}
</style>
</head>

<body>

<div class="container">

<h2>📋 ЦОО тикетов</h2>

<div class="card">
<input id="date" type="date">
<input id="ticket" placeholder="Тикет">
<input id="idnumber" placeholder="ID">
<textarea id="violation" placeholder="Нарушение"></textarea>
<textarea id="violationComment" placeholder="Комментарий"></textarea>
<input id="violationTime" type="time">
<input id="specialist" placeholder="Специалист">

<select id="status">
<option>В работе</option>
<option>Выполнен</option>
</select>

<button onclick="addTicket()">Добавить</button>
</div>

<div class="card">
<input id="search" placeholder="Поиск" oninput="render()">

<table>
<thead>
<tr>
<th>Дата</th>
<th>Тикет</th>
<th>ID</th>
<th>Нарушение</th>
<th>Комментарий</th>
<th>Время</th>
<th>Специалист</th>
<th>Статус</th>
<th>Удалить</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>
</div>

</div>

<script>
// 🔴 ВСТАВЬ СВОЙ FIREBASE CONFIG СЮДА
const firebaseConfig = {
  apiKey: "...",
  authDomain: "...",
  databaseURL: "...",
  projectId: "...",
  storageBucket: "...",
  messagingSenderId: "...",
  appId: "..."
};

firebase.initializeApp(firebaseConfig);
const ref = firebase.database().ref("tickets");

let cache = {};

// LOAD DATA
ref.on("value", snap => {
  cache = snap.val() || {};
  render();
});

// ADD
function addTicket(){
  const ticket = document.getElementById("ticket").value;

  if(!ticket){
    alert("Введите тикет");
    return;
  }

  ref.push({
    date: document.getElementById("date").value,
    ticket: ticket,
    idnumber: document.getElementById("idnumber").value,
    violation: document.getElementById("violation").value,
    violationComment: document.getElementById("violationComment").value,
    violationTime: document.getElementById("violationTime").value,
    specialist: document.getElementById("specialist").value,
    status: document.getElementById("status").value,
    createdAt: Date.now()
  });

  alert("Добавлено");

  document.getElementById("ticket").value = "";
  document.getElementById("idnumber").value = "";
  document.getElementById("violation").value = "";
  document.getElementById("violationComment").value = "";
  document.getElementById("violationTime").value = "";
  document.getElementById("specialist").value = "";
}

// DELETE
function deleteTicket(id){
  ref.child(id).remove();
}

// RENDER
function render(){
  const list = document.getElementById("list");
  const q = (document.getElementById("search").value || "").toLowerCase();

  let html = "";

  Object.entries(cache)
    .sort((a,b)=> (b[1].createdAt||0)-(a[1].createdAt||0))
    .forEach(([id,t])=>{

      if(JSON.stringify(t).toLowerCase().includes(q)){
        html += `
          <tr>
            <td>${t.date||""}</td>
            <td>${t.ticket||""}</td>
            <td>${t.idnumber||""}</td>
            <td>${t.violation||""}</td>
            <td>${t.violationComment||""}</td>
            <td>${t.violationTime||""}</td>
            <td>${t.specialist||""}</td>
            <td>${t.status||""}</td>
            <td><button onclick="deleteTicket('${id}')">X</button></td>
          </tr>
        `;
      }

    });

  list.innerHTML = html;
}
</script>

</script>
</body>
</html>
